<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 px-4">
  <div class="w-full max-w-md">
    <!-- Hero Image -->
    <div class="mb-6 rounded-2xl overflow-hidden shadow-2xl h-48">
      <img 
        src="https://images.unsplash.com/photo-1555238920-7a6bea18473b?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=800" 
        alt="Office" 
        class="w-full h-full object-cover"
      />
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Career Passport</h1>
        <p class="text-gray-500 text-sm mt-2">Professional networking platform for alumni, employers & staff</p>
      </div>

      <!-- Tab Selection -->
      <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-lg">
        <button 
          ng-repeat="tab in ['Alumni', 'Employer', 'Staff']"
          ng-click="selectedTab = tab"
          ng-class="{'bg-white text-[#0d2657] shadow-sm': selectedTab === tab, 'text-gray-600': selectedTab !== tab}"
          class="flex-1 py-2 px-3 rounded text-sm font-semibold transition-all"
        >
          {{tab}}
        </button>
      </div>

      <!-- Email Input -->
      <div class="mb-4">
        <label class="text-sm text-gray-700 font-semibold mb-2 block">Email Address</label>
        <div class="flex items-center border border-gray-300 rounded-lg px-3.5 py-3 focus-within:border-[#1a5cdb] focus-within:ring-1 focus-within:ring-blue-500 transition-all">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
          <input 
            type="email" 
            ng-model="loginForm.email" 
            placeholder="you@university.edu"
            class="flex-1 outline-none text-sm text-gray-700 placeholder-gray-400 bg-transparent ml-3"
          />
        </div>
      </div>

      <!-- Password Input -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-2">
          <label class="text-sm text-gray-700 font-semibold">Password</label>
          <button ng-click="showForgotPassword()" class="text-xs text-[#1a5cdb] hover:underline">Forgot?</button>
        </div>
        <div class="flex items-center border border-gray-300 rounded-lg px-3.5 py-3 focus-within:border-[#1a5cdb] focus-within:ring-1 focus-within:ring-blue-500 transition-all">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
          <input 
            type="password" 
            ng-model="loginForm.password" 
            placeholder="••••••••"
            class="flex-1 outline-none text-sm text-gray-700 placeholder-gray-400 bg-transparent ml-3"
          />
        </div>
      </div>

      <!-- Sign In Button -->
      <button 
        ng-click="login()" 
        class="w-full bg-[#0d2657] hover:bg-[#1a3a6b] text-white font-semibold py-3 px-4 rounded-lg transition-colors mb-3"
      >
        Sign In
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Google Login Button -->
      <button 
        ng-click="loginWithGoogle()" 
        class="w-full border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- SSO Link -->
      <button 
        ng-click="showSSO()" 
        class="w-full text-center text-sm text-[#1a5cdb] hover:underline mt-4"
      >
        Use Single Sign-On (SSO)
      </button>

      <!-- Footer -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          No account yet? 
          <button ng-click="showRequestAccess()" class="text-[#1a5cdb] font-semibold hover:underline">Request Access</button>
        </p>
      </div>
    </div>
  </div>
</div>
