<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
  <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
    <div class="text-center mb-8">
      <h1 class="text-4xl mb-2">🪪</h1>
      <h2 class="text-3xl font-bold text-gray-900">Career Passport</h2>
      <p class="text-gray-600 mt-2">Your professional networking platform</p>
    </div>

    <form ng-submit="login()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input 
          type="email" 
          ng-model="loginForm.email" 
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input 
          type="password" 
          ng-model="loginForm.password" 
          placeholder="Enter your password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors"
      >
        Sign In
      </button>
    </form>

    <div class="mt-4">
      <button 
        ng-click="loginWithGoogle()"
        class="w-full border border-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center"
      >
        <span class="mr-2">🔍</span> Sign in with Google
      </button>
    </div>

    <div class="mt-6 text-center">
      <p class="text-gray-600">Don't have an account? <a ng-click="signup()" class="text-blue-600 hover:underline cursor-pointer">Sign up</a></p>
    </div>
  </div>
</div>
