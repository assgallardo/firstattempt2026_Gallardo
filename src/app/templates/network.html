<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-6 py-6">
      <h1 class="text-3xl font-bold text-gray-900">My Network</h1>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-5xl mx-auto px-6 py-8 pb-32">
    <!-- Connections -->
    <div class="mb-8">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Connections ({{connections.length}})</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div ng-repeat="connection in connections" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-all">
          <div class="flex items-start justify-between mb-3">
            <div class="w-12 h-12 bg-gradient-to-br from-[#0d2657] to-[#1a5cdb] rounded-full flex items-center justify-center text-white font-bold text-lg">
              {{connection.avatar}}
            </div>
            <button 
              ng-click="removeConnection(connection)" 
              class="text-red-400 hover:text-red-600 transition-colors"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>
          <h4 class="font-bold text-gray-900">{{connection.name}}</h4>
          <p class="text-sm text-gray-600 mt-1">{{connection.title}}</p>
          <p class="text-xs text-gray-500">at {{connection.company}}</p>
        </div>
      </div>
    </div>

    <!-- Suggestions -->
    <div>
      <h2 class="text-xl font-bold text-gray-900 mb-4">People You May Know</h2>
      <div class="space-y-3">
        <div ng-repeat="suggestion in suggestions" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-all">
          <div class="flex items-start justify-between">
            <div class="flex items-start gap-3 flex-1">
              <div class="w-12 h-12 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0">
                {{suggestion.avatar}}
              </div>
              <div class="flex-1">
                <h4 class="font-bold text-gray-900">{{suggestion.name}}</h4>
                <p class="text-sm text-gray-600 mt-0.5">{{suggestion.title}}</p>
                <p class="text-xs text-gray-500 mt-1">
                  <svg class="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-2a6 6 0 0112 0v2zm0 0h6v-2a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                  {{suggestion.mutualConnections}} mutual connections
                </p>
              </div>
            </div>
            <button 
              ng-click="connectUser(suggestion)" 
              class="px-4 py-2 bg-[#0d2657] hover:bg-[#1a3a6b] text-white rounded-lg font-semibold text-sm transition-colors shrink-0"
            >
              Connect
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<bottom-nav></bottom-nav>
