<div class="max-w-6xl mx-auto px-4 py-6 pb-24">
  <h1 class="text-3xl font-bold text-gray-900 mb-6">Browse Jobs</h1>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <input 
      type="text" 
      ng-model="filters.search" 
      placeholder="Search jobs..."
      class="col-span-1 md:col-span-2 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <select 
      ng-model="filters.location" 
      class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
      <option value="">All Locations</option>
      <option value="sf">San Francisco, CA</option>
      <option value="ny">New York, NY</option>
      <option value="remote">Remote</option>
    </select>
    <button 
      ng-click="searchJobs()" 
      class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
    >
      Search
    </button>
  </div>

  <div class="grid grid-cols-1 gap-4">
    <div ng-repeat="job in jobs" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
      <div class="flex justify-between items-start mb-2">
        <div>
          <h3 class="text-xl font-bold text-gray-900">{{job.title}}</h3>
          <p class="text-gray-600">{{job.company}} • {{job.location}}</p>
        </div>
        <button 
          ng-click="saveJob(job)" 
          ng-class="{'bg-yellow-100 text-yellow-800': job.saved, 'bg-gray-100 text-gray-800': !job.saved}"
          class="px-3 py-1 rounded-lg text-sm"
        >
          ⭐
        </button>
      </div>
      <p class="text-gray-700 mb-3">{{job.description}}</p>
      <p class="text-lg font-bold text-blue-600 mb-3">{{job.salary}}</p>
      <div class="flex flex-wrap gap-2 mb-4">
        <span ng-repeat="tag in job.tags" class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-sm">{{tag}}</span>
      </div>
      <button 
        ng-click="applyForJob(job)" 
        class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold"
      >
        Apply Now
      </button>
    </div>
  </div>
</div>

<bottom-nav></bottom-nav>
