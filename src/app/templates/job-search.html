<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between gap-4">
        <h1 class="text-2xl font-bold text-gray-900">Explore Opportunities</h1>
        <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Search & Filters -->
  <div class="max-w-6xl mx-auto px-6 py-6">
    <div class="flex gap-3 mb-6">
      <div class="flex-1 relative">
        <svg class="absolute left-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input 
          type="text" 
          ng-model="filters.search" 
          placeholder="Search by title, company, or skills..."
          class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1a5cdb] focus:ring-1 focus:ring-blue-500 transition-all"
        />
      </div>
      <select 
        ng-model="filters.location" 
        class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1a5cdb] text-gray-700"
      >
        <option value="">All Locations</option>
        <option value="sf">San Francisco, CA</option>
        <option value="ny">New York, NY</option>
        <option value="remote">Remote</option>
      </select>
      <button class="p-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
      </button>
    </div>
  </div>

  <!-- Jobs List -->
  <div class="max-w-6xl mx-auto px-6 pb-32">
    <div ng-repeat="job in jobs" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4 hover:shadow-md transition-all">
      <div class="flex items-start justify-between mb-3">
        <div class="flex-1">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 bg-gradient-to-br from-[#0d2657] to-[#1a5cdb] rounded-lg flex items-center justify-center text-white text-lg font-bold">
              {{job.company.charAt(0)}}
            </div>
            <div>
              <h3 class="text-lg font-bold text-gray-900">{{job.title}}</h3>
              <p class="text-sm text-gray-600">{{job.company}}</p>
            </div>
          </div>
        </div>
        <button 
          ng-click="saveJob(job)" 
          ng-class="{'text-yellow-400 fill-yellow-400': job.saved, 'text-gray-300': !job.saved}"
          class="p-2 hover:scale-110 transition-transform"
        >
          <svg class="w-6 h-6" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
        </button>
      </div>

      <p class="text-gray-700 text-sm mb-3 leading-relaxed">{{job.description}}</p>

      <div class="flex items-center gap-4 mb-4 text-sm text-gray-600">
        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          {{job.location}}
        </div>
        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          {{job.salary}}
        </div>
      </div>

      <div class="flex flex-wrap gap-2 mb-4">
        <span ng-repeat="tag in job.tags" class="inline-flex items-center bg-blue-50 text-[#0d2657] px-3 py-1 rounded-full text-xs font-medium border border-blue-200">{{tag}}</span>
      </div>

      <button 
        ng-click="applyForJob(job)" 
        class="w-full px-4 py-2.5 bg-[#0d2657] hover:bg-[#1a3a6b] text-white rounded-lg font-semibold transition-colors"
      >
        Apply Now
      </button>
    </div>
  </div>
</div>

<bottom-nav></bottom-nav>
