<div class="min-h-screen bg-white flex flex-col">
  <!-- Header -->
  <div class="border-b border-gray-100 bg-white sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">
      <div>
        <h1 class="text-[#0d2657] font-bold text-3xl">Messages</h1>
        <p class="text-gray-400 text-sm mt-1">{{conversations.length}} conversations</p>
      </div>
    </div>
  </div>

  <!-- Messages Layout -->
  <div class="flex-1 overflow-hidden">
    <div class="h-full max-w-7xl mx-auto w-full px-8 py-6 pb-24 flex gap-6">
      <!-- Conversations List -->
      <div class="w-96 flex flex-col border border-gray-100 rounded-3xl bg-white shrink-0 overflow-hidden">
        <!-- Search -->
        <div class="p-4 border-b border-gray-100 shrink-0">
          <div class="flex items-center border border-gray-200 rounded-xl px-3 py-2.5 gap-2 bg-gray-50 focus-within:border-[#1a5cdb] transition-colors">
            <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" ng-model="searchQuery" placeholder="Search conversations..." 
              class="flex-1 bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400" />
          </div>
        </div>
        
        <!-- Conversation List -->
        <div class="flex-1 overflow-y-auto">
          <div ng-repeat="conversation in conversations" 
            ng-click="selectConversation(conversation)"
            ng-class="{'bg-blue-50 border-l-4 border-[#1a5cdb]': selectedConversation && selectedConversation.id === conversation.id}"
            class="p-4 cursor-pointer hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0"
          >
            <div class="flex items-start gap-3">
              <img ng-src="{{conversation.avatar}}" alt="Avatar" class="w-12 h-12 rounded-full object-cover shrink-0" />
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between gap-2 mb-1">
                  <h4 class="text-[#0d2657] font-semibold text-sm">{{conversation.name}}</h4>
                  <span ng-if="conversation.unread > 0" class="bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shrink-0">{{conversation.unread}}</span>
                </div>
                <p class="text-xs text-gray-600 truncate">{{conversation.lastMessage}}</p>
                <p class="text-xs text-gray-400 mt-1">{{conversation.timestamp}}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Area -->
      <div ng-if="selectedConversation" class="flex-1 flex flex-col border border-gray-100 rounded-3xl bg-white overflow-hidden">
        <!-- Chat Header -->
        <div class="border-b border-gray-100 p-6 flex items-center justify-between shrink-0">
          <div class="flex items-center gap-4">
            <img ng-src="{{selectedConversation.avatar}}" alt="Avatar" class="w-12 h-12 rounded-full object-cover" />
            <div>
              <h3 class="text-[#0d2657] font-bold">{{selectedConversation.name}}</h3>
              <p class="text-xs text-gray-400">Active now</p>
            </div>
          </div>
          <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
          </button>
        </div>

        <!-- Messages Area -->
        <div class="flex-1 p-6 flex flex-col justify-end">
          <div class="text-center text-gray-400">
            <svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            <p class="text-sm">Start your conversation</p>
          </div>
        </div>

        <!-- Message Input -->
        <div class="border-t border-gray-100 p-6 shrink-0">
          <div class="flex gap-3">
            <input type="text" ng-model="messageInput" placeholder="Type a message..." 
              class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#1a5cdb] transition-colors" />
            <button ng-click="sendMessage()" class="px-6 py-3 bg-[#0d2657] hover:bg-[#1a3a6b] text-white rounded-xl font-semibold text-sm transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div ng-if="!selectedConversation" class="flex-1 flex items-center justify-center text-gray-400 text-center border border-gray-100 rounded-3xl bg-white">
        <div>
          <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
          <p class="text-sm">Select a conversation to start messaging</p>
        </div>
    </div>
  </div>
</div>

<bottom-nav></bottom-nav>
