<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Passport - Offline</title>
    <meta name="theme-color" content="#2F3590" />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #040354;
        color: #ffffff;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        text-align: center;
        background: #2f3590;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 24px 50px rgba(4, 3, 84, 0.35);
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #fdf036;
        color: #040354;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 12px;
      }
      h1 {
        margin: 16px 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.5;
        color: #e6e8ff;
      }
      a {
        color: #fdf036;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="badge">Offline</span>
        <h1>Career Passport is offline</h1>
        <p>
          Check your connection. Saved pages are still available, and the app
          will sync once you are online again.
        </p>
        <a href="/#!/login">Back to Login</a>
      </div>
    </div>
  </body>
</html>
